
services:
  threads-bot:
    build: .
    container_name: discord-threads-fix46
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      # 若已用 login.py 產生 cookies.json，取消下一行註解即可掛載
      # - ./cookies.json:/app/cookies.json:ro
    # Alternatively, you can define the token here directly for Unraid template
    # environment:
    #   - DISCORD_TOKEN=your_token_here
