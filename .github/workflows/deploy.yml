name: Local Docker Build and Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: test
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          echo "${{ secrets.ENV }}" > .env
          docker compose down
          docker compose up -d --build

      - name: Post-deployment cleanup
        run: docker image prune -f

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -s -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{"content": "✅ [dev] Deploy succeeded: `${{ github.repository }}` @ `${{ github.sha }}`"}'

      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -s -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ [dev] Deploy failed: `${{ github.repository }}` @ `${{ github.sha }}`"}'

  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: main
    environment: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          echo "${{ secrets.ENV }}" > .env
          docker compose down
          docker compose up -d --build

      - name: Post-deployment cleanup
        run: docker image prune -f

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -s -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{"content": "✅ [main] Deploy succeeded: `${{ github.repository }}` @ `${{ github.sha }}`"}'

      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -s -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ [main] Deploy failed: `${{ github.repository }}` @ `${{ github.sha }}`"}'
